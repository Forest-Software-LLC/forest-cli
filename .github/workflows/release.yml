name: Build & Publish to R2

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*.*.*"

env:
  BIN_NAME: forest                  # ← change to your Rust binary/crate name
  DEFAULT_PREFIX: cli
  DIST_DIR: dist
  LATEST_ALIAS: latest
  MIRROR_BINARIES_TO_LATEST: "false"   # set "true" to also copy binaries into releases/latest/

permissions:
  contents: write      # mirror the manifest to a GitHub Release (second origin for checksums)
  id-token: write      # build provenance attestations
  attestations: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin   # cross-compiled on Apple Silicon: GitHub retired the Intel macos-13 runner

    steps:
      - uses: actions/checkout@v4
        with:
          # shared/ submodule = forest-shared-resources contracts, embedded
          # via include_str! - the build fails without it.
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config

      - name: Build (release)
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${{ matrix.target }}" == *"musl"* ]]; then
            export RUSTFLAGS="-C target-feature=+crt-static"
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Strip (smaller binaries)
        if: startsWith(matrix.os, 'ubuntu') || startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euxo pipefail
          BIN="target/${{ matrix.target }}/release/${BIN_NAME}"
          (command -v llvm-strip && llvm-strip "$BIN") || (command -v strip && strip "$BIN") || true

      - name: Stage outputs
        shell: bash
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          EXT=""
          if [[ "${{ matrix.os }}" == windows-* ]]; then EXT=".exe"; fi
          SRC="target/${{ matrix.target }}/release/${BIN_NAME}${EXT}"
          OUT="${BIN_NAME}-${TAG}-${{ matrix.target }}${EXT}"
          cp "$SRC" "$OUT"
          echo "Built $OUT"

      # Cryptographic proof that each binary was built by this workflow from
      # this commit - anyone can check with `gh attestation verify`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.BIN_NAME }}-*

      - uses: actions/upload-artifact@v4
        with:
          name: built-${{ matrix.target }}
          path: |
            *.exe
            *-apple-darwin
            *-unknown-linux-*
          overwrite: true                      # ← safe for re-runs

  publish:
    needs: build
    runs-on: ubuntu-22.04
    environment: 
      name: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: built-*
          path: ${{ env.DIST_DIR }}
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install TS deps
        run: |
          echo '{}' > package.json
          npm i --no-save --no-package-lock tsx @aws-sdk/client-s3

      - name: Release to R2 (checksums + latest.json + upload)
        env:
          DIST_DIR: ${{ env.DIST_DIR }}
          TAG: ${{ github.ref_name }}
          BIN_NAME: ${{ env.BIN_NAME }}
          LATEST_ALIAS: ${{ env.LATEST_ALIAS }}
          MIRROR_BINARIES_TO_LATEST: ${{ env.MIRROR_BINARIES_TO_LATEST }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          R2_ACCESS_ID: ${{ secrets.R2_ACCESS_ID }}
          R2_ACCESS_SECRET: ${{ secrets.R2_ACCESS_SECRET }}
          CDN_BASE: ${{ vars.CDN_BASE || '' }}
        run: npx tsx scripts/release.ts

      # Second origin for the manifest/checksums: forging a release would now
      # require compromising R2 AND GitHub together.
      - name: Mirror manifest to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" \
            --notes "Checksum mirror for the R2 release. Binaries are served from releases.forest.dev." \
            || true
          gh release upload "${{ github.ref_name }}" "${DIST_DIR}/latest.json" --clobber

      - name: Signing reminder
        run: |
          {
            echo "## ⚠️ Release is NOT installable yet"
            echo ""
            echo "Binaries and manifest are uploaded, but the manifest is unsigned."
            echo "New CLIs and the install scripts refuse unsigned manifests. Sign it locally:"
            echo ""
            echo '```'
            echo "FOREST_RELEASE_BUCKET=<bucket> scripts/sign-release.sh ${{ github.ref_name }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
